<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATLAS AI Chat - SIR, BURTON</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .chat-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 800px;
            height: 80vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 1.5em;
            font-weight: bold;
            border-radius: 20px 20px 0 0;
        }

        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background: #f8f9fa;
        }

        .message {
            margin-bottom: 15px;
            padding: 12px 16px;
            border-radius: 18px;
            max-width: 70%;
            word-wrap: break-word;
        }

        .message.user {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            margin-left: auto;
            text-align: right;
        }

        .message.atlas {
            background: #e9ecef;
            color: #333;
            margin-right: auto;
        }

        .chat-input {
            padding: 20px;
            background: white;
            border-top: 1px solid #dee2e6;
            display: flex;
            gap: 10px;
        }

        #messageInput {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #dee2e6;
            border-radius: 25px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }

        #messageInput:focus {
            border-color: #667eea;
        }

        #sendButton {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        #sendButton:hover {
            transform: scale(1.05);
        }

        #sendButton:disabled {
            background: #6c757d;
            cursor: not-allowed;
            transform: none;
        }

        .typing {
            display: none;
            font-style: italic;
            color: #6c757d;
            padding: 10px 20px;
        }

        .status {
            text-align: center;
            padding: 10px;
            background: #d4edda;
            color: #155724;
            border-radius: 0 0 20px 20px;
            font-size: 14px;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            🤖 ATLAS AI Assistant - SIR, BURTON
        </div>

        <div class="chat-messages" id="chatMessages">
            <div class="message atlas">
                Hello! I'm ATLAS v2.0, your AI assistant created by SIR, BURTON. How can I help you today?
            </div>
        </div>

        <div class="typing" id="typingIndicator">
            ATLAS is thinking...
        </div>

        <div class="chat-input">
            <input type="text" id="messageInput" placeholder="Type your message here..." maxlength="500">
            <button id="sendButton">Send</button>
        </div>

        <div class="status" id="status">
            Connected to ATLAS server
        </div>
    </div>

    <script>
        const ATLAS_API_URL = 'http://localhost:8000';
        const chatMessages = document.getElementById('chatMessages');
        const messageInput = document.getElementById('messageInput');
        const sendButton = document.getElementById('sendButton');
        const typingIndicator = document.getElementById('typingIndicator');
        const statusDiv = document.getElementById('status');

        let isConnected = false;

        // Check server connection
        async function checkConnection() {
            try {
                const response = await fetch(`${ATLAS_API_URL}/health`);
                if (response.ok) {
                    isConnected = true;
                    statusDiv.textContent = 'Connected to ATLAS server';
                    statusDiv.classList.remove('error');
                } else {
                    throw new Error('Server not responding');
                }
            } catch (error) {
                isConnected = false;
                statusDiv.textContent = 'Cannot connect to ATLAS server. Make sure it\'s running on port 8000.';
                statusDiv.classList.add('error');
                console.error('Connection error:', error);
            }
        }

        // Send message to ATLAS
        async function sendMessage(message) {
            if (!isConnected) {
                addMessage('ATLAS', 'Sorry, I cannot connect to the server right now. Please make sure ATLAS is running.', 'atlas');
                return;
            }

            try {
                typingIndicator.style.display = 'block';
                sendButton.disabled = true;

                const response = await fetch(`${ATLAS_API_URL}/chat`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        user: 'WebUser',
                        message: message
                    })
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();
                addMessage('ATLAS', `Response logged: ${data.message || 'Message processed'}`, 'atlas');

            } catch (error) {
                console.error('Error sending message:', error);
                addMessage('ATLAS', 'Sorry, there was an error processing your message. Please try again.', 'atlas');
            } finally {
                typingIndicator.style.display = 'none';
                sendButton.disabled = false;
            }
        }

        // Add message to chat
        function addMessage(sender, message, type) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;
            messageDiv.textContent = `${sender}: ${message}`;
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // Event listeners
        sendButton.addEventListener('click', () => {
            const message = messageInput.value.trim();
            if (message) {
                addMessage('You', message, 'user');
                sendMessage(message);
                messageInput.value = '';
            }
        });

        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendButton.click();
            }
        });

        // Initialize
        checkConnection();
        setInterval(checkConnection, 30000); // Check connection every 30 seconds

        // Focus input
        messageInput.focus();
    </script>
</body>
</html>
